name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（必须大于当前最新版本，留空则自动递增 patch）"
        required: false
        type: string
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_NUM="${LATEST#v}"
          echo "Latest tag: $LATEST"

          if [ -n "${{ inputs.version }}" ]; then
            NEXT="${{ inputs.version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_NUM"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          # 校验版本号必须大于当前
          LATEST_ORD=$(echo "$LATEST_NUM" | awk -F. '{printf "%04d%04d%04d", $1, $2, $3}')
          NEXT_ORD=$(echo "$NEXT" | awk -F. '{printf "%04d%04d%04d", $1, $2, $3}')
          if [ "$NEXT_ORD" -le "$LATEST_ORD" ]; then
            echo "❌ 版本 $NEXT 不大于当前最新版本 $LATEST_NUM"
            exit 1
          fi

          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" package.json
          git add package.json
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Install dependencies
        run: bun install

      - name: Build app
        run: bun run build

      - name: Package (arm64 + x64)
        run: bun run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
          fail_on_unmatched_files: true
